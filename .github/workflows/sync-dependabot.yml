name: Sync Dependabot Configuration

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - ".github/dependabot.yml"
      - ".github/sync.yml"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Sync files
        uses: BetaHuhn/repo-file-sync-action@v1.21.1
        with:
          GH_PAT: ${{ secrets.ORG_CI_GITHUB }}
