name: Pull Request CI
on:
  pull_request:
    branches:
      - develop
      - "release/**"

env:
  CI: 1

jobs:
  markdown-spell-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - id: nixpath
        run: echo "nix_path=nixpkgs=$(jq -r '.nixpkgs.url' nix/sources.json)" >> $GITHUB_OUTPUT
      - uses: cachix/install-nix-action@v31.10.6
        with:
          nix_path: "${{ steps.nixpath.outputs.nix_path }}"
      - name: Run spell check
        run: nix-shell -p codespell --run "git ls-files '*.md' | xargs codespell --ignore-words '.codespell-ignores.txt'"
  plugin-changed:
    runs-on: ubuntu-latest
    outputs:
      rust_changed: ${{ steps.changes.outputs.rust }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            rust:
              - 'plugin/**'
              - 'openebs-upgrade/**'
              - 'nix/**'
              - shell.nix
              - default.nix
              - Cargo.toml
              - Cargo.lock
              - 'mayastor/**'
  plugin-build-utils:
    needs: plugin-changed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: 'recursive'
      - id: nixpath
        run: echo "nix_path=nixpkgs=$(jq -r '.nixpkgs.url' nix/sources.json)" >> $GITHUB_OUTPUT
      - uses: cachix/install-nix-action@v31.10.6
        with:
          nix_path: "${{ steps.nixpath.outputs.nix_path }}"
        if: needs.plugin-changed.outputs.rust_changed == 'true'
      - name: Test building the static binaries
        if: needs.plugin-changed.outputs.rust_changed == 'true'
        # todo: modify downstream release.sh to build plugin via utils
        #  perhaps it's time to rename utils or convert all to the utils build
        run: nix-build -A utils.debug.x86_64.linux-musl.kubectl-openebs --arg incremental false
  plugin-build-script:
    needs: plugin-changed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: 'recursive'
      - id: nixpath
        run: echo "nix_path=nixpkgs=$(jq -r '.nixpkgs.url' nix/sources.json)" >> $GITHUB_OUTPUT
      - uses: cachix/install-nix-action@v31.10.6
        with:
          nix_path: "${{ steps.nixpath.outputs.nix_path }}"
        if: needs.plugin-changed.outputs.rust_changed == 'true'
      - name: Test building the static binaries
        if: needs.plugin-changed.outputs.rust_changed == 'true'
        run: ./scripts/release.sh --skip-images --build-bins --debug
